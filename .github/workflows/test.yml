name: Run template tests

on:
  push:
    branches:
      - main
      - "renovate/**"
  pull_request:
  schedule:
    # Run at 11 am on the 2nd January each year to make sure
    # dates in package regression test data get updated
    # See https://github.com/UCL-ARC/python-tooling/pull/597
    - cron: "0 11 2 1 *"

jobs:
  test-template:
    name: test ${{ matrix.os }} py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Checkout source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Cache tox
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: .tox
          key: test-${{ hashFiles('pyproject.toml') }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: python -m pip install tox tox-gh

      - name: Run tests
        run: tox run
        env:
          TOX_GH_MAJOR_MINOR: ${{ matrix.python-version }}
